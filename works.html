<section class="works-section section-panel" id="works">
  <div class="container-fluid content-wrap">
    <div class="works-heading-wrap">
      <div class="section-heading" data-animate>
        <p class="kicker">Portfolio</p>
        <h2>Sample <span>Works</span></h2>
      </div>
    </div>

    <div class="project-carousel" data-animate>
      <button class="carousel-control prev" type="button" aria-label="Previous project">
        <i class="bi bi-chevron-left"></i>
      </button>

      <div class="project-track" tabindex="0" aria-label="Project carousel">
        <article
          class="project-card"
          tabindex="0"
          role="button"
          data-title="Well, Well, Wellness"
          data-code="https://github.com/"
          data-banner="wellness"
          data-description="A C# health and wellness application designed to support a balanced lifestyle through accessible wellness-focused features.">
          <div class="project-banner wellness" aria-hidden="true">
            <i class="bi bi-heart-pulse"></i>
          </div>
          <div class="project-body">
            <h3>Well, Well, Wellness</h3>
            <p>A C# application focused on health and wellness.</p>
          </div>
        </article>

        <article
          class="project-card"
          tabindex="0"
          role="button"
          data-title="ClicKet"
          data-code="https://github.com/"
          data-banner="clicket"
          data-description="A ticketing reservation system for events, designed to make event discovery, reservations, and ticket access easier for users.">
          <div class="project-banner clicket" aria-hidden="true">
            <i class="bi bi-ticket-perforated"></i>
          </div>
          <div class="project-body">
            <h3>ClicKet</h3>
            <p>A ticketing reservation system for events.</p>
          </div>
        </article>

        <article
          class="project-card"
          tabindex="0"
          role="button"
          data-title="PUP Dash"
          data-code="https://github.com/"
          data-banner="pupdash"
          data-description="A Python-based game inspired by PUP, combining campus-inspired visuals with an engaging dash-style game concept.">
          <div class="project-banner pupdash" aria-hidden="true">
            <i class="bi bi-joystick"></i>
          </div>
          <div class="project-body">
            <h3>PUP Dash</h3>
            <p>A Python-based game inspired by PUP.</p>
          </div>
        </article>

        <article
          class="project-card"
          tabindex="0"
          role="button"
          data-title="ApeX Gear"
          data-code="https://github.com/"
          data-banner="apexgear"
          data-description="An e-commerce website that sells technology-based accessories through a polished online storefront experience.">
          <div class="project-banner apexgear" aria-hidden="true">
            <i class="bi bi-laptop"></i>
          </div>
          <div class="project-body">
            <h3>ApeX Gear</h3>
            <p>An e-commerce website for tech-based accessories.</p>
          </div>
        </article>
      </div>

      <button class="carousel-control next" type="button" aria-label="Next project">
        <i class="bi bi-chevron-right"></i>
      </button>
    </div>
  </div>
</section>

<div class="project-modal" aria-hidden="true">
  <div class="project-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="projectModalTitle">
    <button class="project-modal-close" type="button" aria-label="Close project modal">
      <i class="bi bi-x-lg"></i>
    </button>
    <div class="project-modal-banner" aria-hidden="true"></div>
    <div class="project-modal-content">
      <h3 id="projectModalTitle"></h3>
      <p id="projectModalDescription"></p>
      <a class="btn-primary-blue project-code-link" href="#" target="_blank" rel="noopener">
        View Code
      </a>
    </div>
  </div>
</div>
